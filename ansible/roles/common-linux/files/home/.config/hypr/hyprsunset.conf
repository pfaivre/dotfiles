# Configures screen color temperature at different times of the day
# More info at https://wiki.hypr.land/Hypr-Ecosystem/hyprsunset/

#
# Summer times
#

profile {
    time = 7:30
    temperature = 5500
}

profile {
    time = 8:00
    identity = true
}

profile {
    time = 21:00
    temperature = 5000
}

profile {
    time = 22:00
    temperature = 4500
}

profile {
    time = 23:00
    temperature = 4000
}

profile {
    time = 23:30
    temperature = 3500
}


