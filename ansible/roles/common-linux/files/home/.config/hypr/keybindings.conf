###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
# See https://wiki.hyprland.org/Configuring/Binds/

bind = CTRL_ALT, T,       exec, $terminal
bind = SUPER, Return,     exec, $terminal
bind = SUPER, ESCAPE,     exec, ~/.local/bin/command-palette.sh
bind = SUPER, space,      exec, $menu
bind = SUPER, E,          exec, $fileManager
bind = SUPER, semicolon,  exec, ~/.local/bin/select-emoji-fr.sh
bind = SUPER, M,          exec, pkill wlogout; wlogout --css ~/.config/mydesktop/current-theme/wlogout/style.css -b 4
bind = SUPER, L,          exec, loginctl lock-session
bind = SUPER CTRL, space, exec, python ~/.local/bin/set-wallpaper.py next
bind = SUPER, DELETE,     killactive,
bind = SUPER, left,       movefocus, l
bind = SUPER, right,      movefocus, r
bind = SUPER, up,         movefocus, u
bind = SUPER, down,       movefocus, d
bind = SUPER, V,          togglefloating
bind = SUPER, V,          resizeactive, exact 1080 620
bind = SUPER, V,          centerwindow
bind = SUPER, P,          pseudo, # dwindle
bind = SUPER, J,          togglesplit, # dwindle
bind = , PRINT,           exec, hyprshot -m output
bind = SHIFT, PRINT,      exec, hyprshot -m window

# Move to a workspace (AZERTY keyboard)
bind = SUPER, ampersand,  workspace,   1
bind = SUPER, eacute,     workspace,   2
bind = SUPER, quotedbl,   workspace,   3
bind = SUPER, apostrophe, workspace,   4
bind = SUPER, parenleft,  workspace,   5
bind = SUPER, egrave,     workspace,   6
bind = SUPER, minus,      workspace,   7
bind = SUPER, underscore, workspace,   8
bind = SUPER, ccedilla,   workspace,   9
bind = SUPER, agrave,     workspace,  10
bind = SUPER CTRL, left,  workspace,  -1
bind = SUPER CTRL, right, workspace,  +1
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1

# Send window to a workspace (AZERTY keyboard)
bind = SUPER SHIFT, ampersand,  movetoworkspace,  1
bind = SUPER SHIFT, eacute,     movetoworkspace,  2
bind = SUPER SHIFT, quotedbl,   movetoworkspace,  3
bind = SUPER SHIFT, apostrophe, movetoworkspace,  4
bind = SUPER SHIFT, parenleft,  movetoworkspace,  5
bind = SUPER SHIFT, egrave,     movetoworkspace,  6
bind = SUPER SHIFT, minus,      movetoworkspace,  7
bind = SUPER SHIFT, underscore, movetoworkspace,  8
bind = SUPER SHIFT, ccedilla,   movetoworkspace,  9
bind = SUPER SHIFT, agrave,     movetoworkspace, 10
bind = SUPER CTRL_SHIFT, left,  movetoworkspace, -1
bind = SUPER CTRL_SHIFT, right, movetoworkspace, +1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Adjut screen brightness through ddccontrol
bind = CONTROL SHIFT, PAGE_UP,   exec, ddccontrol -r 0x10 -W 10 dev:/dev/i2c-4
bind = CONTROL SHIFT, PAGE_DOWN, exec, ddccontrol -r 0x10 -W -10 dev:/dev/i2c-4

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1
bindel = ,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
