#############
### THEME ###
#############

source = ~/.config/mydesktop/current-theme/hypr/style.conf


###################
### MY PROGRAMS ###
###################

$terminal = alacritty
$fileManager = thunar
$menu = pkill rofi; rofi -show drun -show-icons


source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf


#################
### AUTOSTART ###
#################

# Start with visible stuff:
exec-once = systemctl --user start hyprpaper                                    # Wallpaper
exec-once = waybar -s ~/.config/mydesktop/current-theme/waybar/style.css        # Task bar
exec-once = python3 ~/.local/bin/configure-hyprsunset.py --lat 48.85 --lon 2.35 # Create the blue light filter config (Paris, France)
exec-once = systemctl --user start hyprsunset                                   # Blue light filter

# Then finish with background things:
exec-once = nm-applet                                                         # NetworkManager
exec-once = swaync --style ~/.config/mydesktop/current-theme/swaync/style.css # Notification daemon
exec-once = ~/.local/bin/first-run.sh                                         # First run config set-up and greetings
exec-once = systemctl --user start hyprpolkitagent                            # Authentication agent, allows user to gain priviledge when needed
exec-once = systemctl --user start hypridle                                   # Idle manager
exec-once = ddccontrol -r 0x10 -W 0 dev:/dev/i2c-4 # First call to ddccontrol takes a few seconds, so let's make it on startup


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    allow_tearing = false
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]


# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    vfr = true # controls the VFR status of Hyprland. Heavily recommended to leave enabled to conserve resources.

    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

cursor {
    no_warps = 1 # if true, will not warp the cursor in many cases (focusing, keybinds, etc)
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
}


##################
### ANIMATIONS ###
##################

animations {
    enabled = true

    # See https://wiki.hypr.land/0.54.0/Configuring/Animations/

    #        NAME           , X0   , Y0   , X1   , Y1
    bezier = easeOutQuint   , 0.23 , 1    , 0.32 , 1
    bezier = easeInOutCubic , 0.65 , 0.05 , 0.36 , 1
    bezier = linear         , 0    , 0    , 1    , 1
    bezier = almostLinear   , 0.5  , 0.5  , 0.75 , 1
    bezier = quick          , 0.15 , 0    , 0.1  , 1
    bezier = easeOutExpo    , 0.16 , 1    , 0.3  , 1

    #           NAME,            ONOFF , SPEED , CURVE        [,STYLE]
    animation = global,              0 , 1     , default
    animation = windows,             0 , 3     , easeOutQuint
    animation = windowsIn,           0 , 4     , easeOutQuint , popin 87%
    animation = windowsOut,          0 , 1     , linear       , popin 87%
    animation = windowsMove,         0 , 3     , easeOutQuint
    animation = fade,                0 , 3     , quick
    animation = fadeIn,              0 , 1     , almostLinear
    animation = fadeOut,             0 , 1     , almostLinear
    animation = fadeSwitch,          0 , 1     , almostLinear
    animation = fadeShadow,          0 , 1     , almostLinear
    animation = fadeDim,             1 , 1     , almostLinear
    animation = fadeLayers,          0 , 1     , almostLinear
    animation = fadeLayersIn,        0 , 1     , almostLinear
    animation = fadeLayersOut,       0 , 1     , almostLinear
    animation = fadePopups,          0 , 1     , easeOutExpo
    animation = fadePopupsIn,        0 , 1     , easeOutExpo
    animation = fadePopupsOut,       0 , 1     , easeOutExpo
    animation = fadeDpms,            1 , 32    , easeOutExpo
    animation = border,              1 , 8     , easeOutQuint
    animation = borderangle,         1 , 10    , almostLinear
    animation = workspaces,          0 , 2     , almostLinear , slide
    animation = workspacesIn,        0 , 2     , easeOutExpo  , slide
    animation = workspacesOut,       0 , 2     , easeOutExpo  , slide
    animation = specialWorkspace,    0 , 2     , easeOutExpo  , slide
    animation = specialWorkspaceIn,  0 , 2     , easeOutExpo  , slide
    animation = specialWorkspaceOut, 0 , 2     , easeOutExpo  , slide
    animation = zoomFactor,          1 , 5     , easeOutQuint
    animation = monitorAdded,        1 , 5     , easeOutQuint
    animation = layers,              1 , 3.8   , easeOutQuint , slide
    animation = layersIn,            1 , 6     , easeOutExpo  , slide left
    animation = layersOut,           1 , 1.5   , easeOutExpo  , slide right
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Volume control window is floating
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = size 960 600, match:class org.pulseaudio.pavucontrol

# Custom "Popup" class is floating
windowrule = float on, match:class Popup
windowrule = size 960 600, match:class Popup

# Gimp windows are floating
windowrule = float on, match:class file-png
windowrule = float on, match:class file-jpeg
windowrule = float on, match:class file-gif-export
windowrule = float on, match:class script-fu

# Some Gnome utilities are floating
windowrule = float on, match:class org.gnome.FileRoller
windowrule = float on, match:class org.gnome.Loupe
windowrule = float on, match:class org.gnome.Calculator
windowrule = float on, match:class xdg-desktop-portal-gtk
windowrule = float on, match:class nvidia-settings

# Firefox picture in picture in the bottom right on all workspaces
windowrule = float on, match:title Incrustation vidéo
windowrule = move monitor_w-window_w-12 monitor_h-window_h-60, match:title Incrustation vidéo
windowrule = size 408 230, match:title Incrustation vidéo
windowrule = content video, match:title Incrustation vidéo
windowrule = pin on, match:title Incrustation vidéo

# No border on Audacious' windows
windowrule = border_size 0, match:initial_class Audacious
windowrule = rounding 8, match:initial_class Audacious

# Disable animations for some layers
layerrule = no_anim on, match:namespace rofi
layerrule = no_anim on, match:namespace logout_dialog
layerrule = no_anim on, match:namespace hyprpicker
layerrule = no_anim on, match:namespace swaync-control-center
layerrule = no_anim on, match:namespace selection  # Hyprshot selection layer

# Animate notifications with a slide from the right
layerrule = animation slidevert right, match:namespace swaync-notification-window


#########################
### PLUG-INS SETTINGS ###
#########################

# See https://github.com/hyprwm/hyprland-plugins for official plug-ins

plugin {
}
